services:
  postgres:
    image: postgres:16-alpine
    container_name: vinyl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vinyl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vinyl"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: deps
    image: vinyl-backend-dev
    container_name: vinyl-backend
    restart: unless-stopped
    working_dir: /app/apps/backend
    command: sh -c "npm run prisma:generate && npm run prisma:push && npm run start:dev"
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./:/app
      - backend_node_modules:/app/apps/backend/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 180s

  frontend:
    image: node:24-alpine
    container_name: vinyl-frontend
    restart: unless-stopped
    working_dir: /app/apps/frontend
    command: sh -c "npm install && npm run dev"
    env_file:
      - .env
    environment:
      API_URL_INTERNAL: ${API_URL_INTERNAL:-http://backend:3001/api}
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3001}/api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./:/app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  postgres_data:
  backend_node_modules:
