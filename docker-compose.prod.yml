services:
  postgres:
    image: postgres:16-alpine
    container_name: vinyl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vinyl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vinyl"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: runner
    image: vinyl-backend-prod
    container_name: vinyl-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
        API_URL_INTERNAL: ${API_URL_INTERNAL:-http://backend:3001/api}
    image: vinyl-frontend-prod
    container_name: vinyl-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_URL_INTERNAL: ${API_URL_INTERNAL:-http://backend:3001/api}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  postgres_data:
